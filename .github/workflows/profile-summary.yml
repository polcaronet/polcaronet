name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@v0.7.0
        with:
          USERNAME: polcaronet
          BRANCH_NAME: main
          UTC_OFFSET: -3
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
